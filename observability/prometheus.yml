global:
  scrape_interval: 15s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ['api:9464']

  - job_name: llm-service
    static_configs:
      - targets: ['llm-service:9464']

  - job_name: image-service
    static_configs:
      - targets: ['image-service:9464']

  - job_name: tts-service
    static_configs:
      - targets: ['tts-service:9464']

  - job_name: stt-service
    static_configs:
      - targets: ['stt-service:9464']

  - job_name: state-mcp
    static_configs:
      - targets: ['state-mcp:9464']

  - job_name: memory-mcp
    static_configs:
      - targets: ['memory-mcp:9464']

  - job_name: knowledge-mcp
    static_configs:
      - targets: ['knowledge-mcp:9464']

  - job_name: media-mcp
    static_configs:
      - targets: ['media-mcp:9464']

  - job_name: character-creator
    static_configs:
      - targets: ['character-creator:9464']

  - job_name: campaign-designer
    static_configs:
      - targets: ['campaign-designer:9464']

  - job_name: dm-agent
    static_configs:
      - targets: ['dm-agent:9464']

  - job_name: npc-agent
    static_configs:
      - targets: ['npc-agent:9464']

  - job_name: memory-agent
    static_configs:
      - targets: ['memory-agent:9464']

  # Tempo metrics (service graph edges generated by Tempo)
  - job_name: tempo
    static_configs:
      - targets: ['tempo:3200']
